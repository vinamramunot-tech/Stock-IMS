name: 'publish'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_NO_WARNINGS: "1"           # silence punycode/other Node deprecation warnings from actions
  # sccache settings
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tag push matching v*, e.g., v1.0.0
  workflow_dispatch: # Allows manual run of the workflow from GitHub Actions tab
    inputs:
      version:
        description: 'Version tag (e.g. v4.2.0). If empty, version is read from package.json.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract version from package.json or git tag
        id: get_version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: prepare
    runs-on: ${{ matrix.settings.platform }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin --no-sign'
            targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: '--no-sign'
            targets: 'x86_64-pc-windows-msvc'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Sync version numbers from the git tag ────────────────────────────────
      # Strips the leading 'v' (v3.5.0 → 3.5.0) and patches all three version
      # files so the built binaries always carry the tag version, not whatever
      # was last committed. Falls back to the existing package.json version on
      # workflow_dispatch runs (no tag).
      - name: Sync version from git tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"   # strip leading 'v'
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "Syncing version to: $VERSION"

          # package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # src-tauri/Cargo.toml  (patches only the first version = "…" line)
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            // Replace only the FIRST occurrence of:  version = \"x.y.z\"
            content = content.replace(/^version = \"[^\"]*\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', content);
          "

          # src-tauri/tauri.conf.json
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.targets }}

      # ── Compiler-level caching via sccache ──────────────────────────────────
      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9
        with:
          version: "v0.10.0"

      # ── Cargo registry / index cache ─────────────────────────────────────────
      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # ── Rust dependency cache (smarter than caching target/ directly) ─────────
      # Only caches compiled dependency artifacts, not your own crate.
      # This survives Cargo.lock patch-bumps via restore-keys fallback and
      # keeps cache size small by excluding build scripts & proc-macros.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Install project dependencies
        run: npm ci

      # Manually build the binaries
      - name: Build Tauri App
        run: npx tauri build ${{ matrix.settings.args }}

      - name: Organize Desktop Artifacts
        shell: bash
        run: |
          mkdir -p dist-desktop
          find src-tauri/target -path "*bundle/nsis/*.exe" -exec cp {} dist-desktop/ \; || true
          find src-tauri/target -path "*bundle/dmg/*.dmg" -exec cp {} dist-desktop/ \; || true

      # Upload build outputs to workflow artifacts
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.settings.platform }}
          path: dist-desktop/
          if-no-files-found: error

  publish-android:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Gradle Cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      # ── Cargo registry / index cache ─────────────────────────────────────────
      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # ── Rust dependency cache ────────────────────────────────────────────────
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Install project dependencies
        run: npm ci

      - name: Initialize Android project
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri android init --ci --skip-targets-install

      - name: Build Android APK
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri android build --apk

      - name: Prepare Unsigned Android APK
        run: |
          # Find the unsigned release APK
          UNSIGNED_APK=$(find src-tauri/gen/android -name "*release-unsigned.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK=$(find src-tauri/gen/android -name "*release.apk" | grep -v "signed" | head -n 1)
          fi
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Unsigned APK not found!"
            exit 1
          fi
          
          echo "Found unsigned APK: $UNSIGNED_APK"
          cp "$UNSIGNED_APK" "mava-gems-stock-android-${{ needs.prepare.outputs.version }}-unsigned.apk"

      # Upload built APK to workflow artifacts
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: mava-gems-stock-android-${{ needs.prepare.outputs.version }}-unsigned.apk
          if-no-files-found: error

  publish-ios:
    needs: prepare
    runs-on: macos-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim'

      # ── Cargo registry / index cache ─────────────────────────────────────────
      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # ── Rust dependency cache ────────────────────────────────────────────────
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Install project dependencies
        run: npm ci

      - name: Initialize iOS project
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri ios init --ci --skip-targets-install

      - name: Build iOS App
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri ios build --no-sign

      - name: Package iOS App as IPA
        run: |
          mkdir -p Payload
          find src-tauri/gen/apple -name "*.app" -exec cp -r {} Payload/ \;
          zip -r mava-gems-stock-ios-${{ needs.prepare.outputs.version }}.ipa Payload

      # Upload built iOS assets to workflow artifacts
      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: mava-gems-stock-ios-${{ needs.prepare.outputs.version }}.ipa
          if-no-files-found: error

  create-release:
    needs: [prepare, publish-tauri, publish-ios, publish-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.prepare.outputs.version }}"
          name: "Mava Gems Stock ${{ needs.prepare.outputs.version }}"
          draft: true
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
