name: 'publish'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tag push matching v*, e.g., v1.0.0
  workflow_dispatch: # Allows manual run of the workflow from GitHub Actions tab

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Extract version from package.json or git tag
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: prepare
    runs-on: ${{ matrix.settings.platform }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            targets: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.targets }}

      - name: Install project dependencies
        run: npm install

      # Manually build the binaries
      - name: Build Tauri App
        run: npx tauri build ${{ matrix.settings.args }}

      # Upload build outputs to workflow artifacts
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.settings.platform }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/nsis/*.exe
          if-no-files-found: ignore

  publish-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      - name: Install project dependencies
        run: npm install

      - name: Initialize Android project
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri android init --ci --skip-targets-install

      - name: Build Android APK
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri android build --apk
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "mava-gems-stock-android-${{ needs.prepare.outputs.version }}.apk"
          fi

      # Upload built APK to workflow artifacts
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: mava-gems-stock-android-${{ needs.prepare.outputs.version }}.apk
          if-no-files-found: ignore

  publish-ios:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim'

      - name: Install project dependencies
        run: npm install

      - name: Initialize iOS project
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri ios init --ci --skip-targets-install

      - name: Build iOS App
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri ios build --no-sign

      - name: Package iOS App as IPA
        run: |
          mkdir -p Payload
          find src-tauri/gen/apple -name "*.app" -exec cp -r {} Payload/ \;
          zip -r mava-gems-stock-ios-${{ needs.prepare.outputs.version }}.ipa Payload

      # Upload built iOS assets to workflow artifacts
      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: mava-gems-stock-ios-${{ needs.prepare.outputs.version }}.ipa
          if-no-files-found: error

  create-release:
    needs: [prepare, publish-tauri, publish-android, publish-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.prepare.outputs.version }}"
          name: "Mava Gems Stock ${{ needs.prepare.outputs.version }}"
          draft: true
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
