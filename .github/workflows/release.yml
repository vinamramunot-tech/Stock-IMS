name: 'publish'

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tag push matching v*, e.g., v1.0.0
  workflow_dispatch: # Allows manual run of the workflow from GitHub Actions tab

jobs:
  publish-tauri:
    permissions:
      contents: write # Essential to compile and upload binary release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin' # Compile universal macOS DMG/app bundle
          - platform: 'windows-latest'
            args: ''                              # Compile Windows EXE/MSI installers
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Install Rust Stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
        
      - name: Install project dependencies
        run: npm install

      - name: Extract version from package.json or git tag
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
          fi
        
      - name: Build and Upload Assets via Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "${{ steps.get_version.outputs.version }}"
          releaseName: "Mava Gems Stock ${{ steps.get_version.outputs.version }}"
          releaseBody: 'Production-ready compiled binaries for Mava Gems. Secure inventory management.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
